<section class="section" id="skills">
  <div class="container">
    <app-section-heading index="04" labelKey="skills.label" />

    <h2 class="display title" appReveal>{{ i18n.t('skills.title') }}</h2>

    <div class="grid">
      @for (group of groups; track group.labelKey; let i = $index) {
        <article class="card" [appReveal]="i * 100">
          <h3 class="mono">{{ i18n.t(group.labelKey) }}</h3>
          <ul>
            @for (skill of group.skills; track skill.name) {
              <li>
                <span class="name">{{ skill.name }}</span>
                @if (skill.level) {
                  <span class="sr-only">{{ skill.level }}/5</span>
                  <app-dot-meter class="meter" [level]="skill.level" />
                }
              </li>
            }
          </ul>
        </article>
      }
    </div>
  </div>
</section>
